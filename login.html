<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In · CabinCast Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-deep: #0a3d3f;
    --teal-mid: #0f5f5c;
    --teal-bright: #14b8a6;
    --teal-soft: #e6f4f3;
    --forest: #1e4d3a;
    --moss: #4a7c59;
    --gold: #c9a449;
    --gold-bright: #e0b94d;
    --gold-soft: #f5e9c4;
    --cream: #fbf8f1;
    --ink: #0d1f1f;
    --ink-soft: #2d4444;
    --line: rgba(10, 61, 63, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--teal-deep), var(--forest));
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: -20%; left: -10%;
    width: 50%; height: 80%;
    background: radial-gradient(circle, rgba(201, 164, 73, 0.18), transparent 70%);
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -20%; right: -10%;
    width: 50%; height: 80%;
    background: radial-gradient(circle, rgba(20, 184, 166, 0.18), transparent 70%);
  }
  .card {
    background: var(--cream);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.4);
    position: relative;
    z-index: 1;
  }
  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo-mark {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.75rem;
    color: var(--teal-deep);
    letter-spacing: -0.02em;
    display: block;
  }
  .logo-sub {
    font-size: 0.75rem;
    color: var(--moss);
    margin-top: 4px;
    font-weight: 500;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.75rem;
    color: var(--teal-deep);
    text-align: center;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }
  .sub {
    text-align: center;
    color: var(--ink-soft);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .field { margin-bottom: 1.25rem; }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--teal-deep);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  input {
    width: 100%;
    padding: 0.85rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: white;
    color: var(--ink);
    transition: border-color .2s;
  }
  input:focus {
    outline: none;
    border-color: var(--teal-bright);
    box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
  }
  .btn {
    width: 100%;
    padding: 0.95rem;
    background: var(--teal-deep);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    margin-top: 0.5rem;
  }
  .btn:hover { background: var(--teal-mid); transform: translateY(-1px); }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    margin: 1rem 0;
  }
  .row a { color: var(--teal-bright); text-decoration: none; font-weight: 500; }
  .row a:hover { text-decoration: underline; }
  .divider {
    text-align: center;
    color: var(--moss);
    font-size: 0.8rem;
    margin: 1.5rem 0 1rem;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: var(--line);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .back-home {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.85rem;
  }
  .back-home a { color: var(--moss); text-decoration: none; }
  .back-home a:hover { color: var(--teal-deep); }
  .notice {
    background: var(--gold-soft);
    border-left: 3px solid var(--gold);
    padding: 0.85rem 1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-bottom: 1.5rem;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-mark">CabinCast Pro</span>
    <div class="logo-sub">by CabinCast Pro</div>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to manage your cabin's welcome screen.</p>

  <div class="notice">
    <strong>Coming soon —</strong> the customer dashboard is under construction. For now, please <a href="mailto:info@VisitIslandParkIdaho.com?subject=CabinCast Pro Account" style="color: var(--teal-deep); font-weight:600;">email us</a> for any account changes.
  </div>

  <form onsubmit="event.preventDefault(); alert('Login coming soon. Email CabinCastPro@gmail.com for now.');">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />
    </div>
    <div class="row">
      <label style="text-transform: none; letter-spacing: 0; font-weight: 400; color: var(--ink-soft); display: flex; align-items: center; gap: 0.4rem;">
        <input type="checkbox" style="width: auto; padding: 0;" /> Remember me
      </label>
      <a href="mailto:CabinCastPro@gmail.com?subject=Password Reset">Forgot password?</a>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>

  <div class="divider">or</div>
  <div style="text-align: center; font-size: 0.9rem; color: var(--ink-soft);">
    Don't have an account? <a href="/#signup" style="color: var(--teal-bright); font-weight: 600;">Get Started</a>
  </div>

  <div class="back-home">
    <a href="/">← Back to home</a>
  </div>
</div>
</body>
</html>
